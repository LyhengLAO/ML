# ============================================
# 01-configmap.yaml
# Configuration non sensible de l'API.
# Un ConfigMap stocke des paires clé/valeur en clair.
# NE PAS stocker de mots de passe ici → utiliser Secret (02-secret.yml).
# Ces variables seront injectées comme variables d'environnement
# dans les conteneurs qui référencent ce ConfigMap.
# ============================================

# Version de l'API Kubernetes. "v1" pour les ressources de base.
apiVersion: v1

# Type de ressource : ConfigMap = stockage de configuration en clair.
kind: ConfigMap

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du ConfigMap, référencé par les Deployments/StatefulSets via "configMapRef".
  name: ml-api-config

  # Namespace cible : cette ressource n'existe que dans "ml-demo".
  namespace: ml-demo

# Section data : les paires clé/valeur de configuration.
# Chaque clé deviendra une variable d'environnement dans le conteneur.
data:

  # Niveau de verbosité des logs de l'API (debug, info, warning, error).
  LOG_LEVEL: "info"

  # Seuil de décision du modèle ML : score > 0.5 → classe 1 (risque élevé).
  MODEL_THRESHOLD: "0.5"

  # Version actuelle du modèle ML déployé, utilisée pour le tracking.
  MODEL_VERSION: "v1.0.0"

  # Nom d'hôte DNS du serveur PostgreSQL.
  # Dans Kubernetes, le DNS interne résout "postgres" vers le Service du même nom.
  DB_HOST: "postgres"

  # Port standard de PostgreSQL.
  DB_PORT: "5432"

  # Nom de la base de données créée au démarrage de PostgreSQL.
  DB_NAME: "mldb"

  # Nom de l'utilisateur PostgreSQL utilisé par l'API.
  DB_USER: "mluser"

  # Nom d'hôte DNS du serveur Redis (résolu via le Service redis).
  REDIS_HOST: "redis"

  # Port standard de Redis.
  REDIS_PORT: "6379"
