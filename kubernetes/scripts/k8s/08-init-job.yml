# ============================================
# 08-init-job.yaml
# Job d'initialisation de la base de données.
# Un Job Kubernetes crée un ou plusieurs pods qui s'exécutent
# jusqu'à complétion (et non indéfiniment comme un Deployment).
# Ce Job attend que PostgreSQL soit prêt, puis crée le schéma SQL
# (table "predictions" et index). Il s'exécute une seule fois.
# ============================================

# Version de l'API pour les ressources batch (Job, CronJob).
apiVersion: batch/v1

# Type de ressource : Job = tâche qui s'exécute jusqu'à complétion.
# Contrairement à un Deployment, un Job s'arrête quand la tâche est terminée.
kind: Job

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du Job.
  name: db-init

  # Namespace cible.
  namespace: ml-demo

# Spécifications du Job.
spec:

  # Nombre maximum de tentatives en cas d'échec.
  # Si le pod échoue 3 fois, le Job passe en état "Failed".
  backoffLimit: 3

  # Durée en secondes après laquelle le Job terminé (succès ou échec) est
  # automatiquement supprimé avec ses pods. 3600s = 1 heure.
  # Evite d'accumuler des Jobs terminés dans le cluster.
  ttlSecondsAfterFinished: 3600

  # Template du pod que le Job va créer pour exécuter la tâche.
  template:

    # Métadonnées du pod créé par le Job.
    metadata:
      labels:
        app: db-init  # Label pour identifier ce pod dans les NetworkPolicies.

    # Spécifications du pod.
    spec:

      # Politique de redémarrage du pod.
      # "OnFailure" : redémarre le conteneur si la commande retourne un code non-zéro.
      # "Never" : crée un nouveau pod à chaque échec (déconseillé pour les Jobs).
      # "Always" n'est pas valide pour les Jobs (utilisé pour les Deployments).
      restartPolicy: OnFailure

      # Liste des conteneurs.
      containers:

      - name: db-init               # Nom du conteneur.
        image: postgres:16-alpine   # Utilise l'image PostgreSQL car elle contient "psql" et "pg_isready".

        # Variables d'environnement.
        env:

        # PGPASSWORD : variable reconnue automatiquement par psql pour s'authentifier.
        # Permet d'éviter de passer le mot de passe en argument de ligne de commande.
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:          # Récupère la valeur depuis le Secret.
              name: ml-api-secrets # Nom du Secret (02-secret.yml).
              key: POSTGRES_PASSWORD

        # Commande exécutée dans le conteneur.
        # On utilise "sh -c |" pour exécuter un script shell multi-lignes.
        command:
        - sh     # Interpréteur shell.
        - -c     # Indique que la commande suivante est une chaîne à interpréter.
        - |      # Bloc YAML de texte littéral (indentation préservée).

          # Boucle d'attente : attend que PostgreSQL soit prêt avant de continuer.
          # pg_isready renvoie 0 si PostgreSQL accepte les connexions, non-zéro sinon.
          # -h postgres : se connecte au Service postgres (résolu par DNS interne).
          # -U mluser : utilisateur à vérifier.
          until pg_isready -h postgres -U mluser; do
            echo "Attente de Postgres..."
            sleep 2  # Attend 2 secondes avant de réessayer.
          done
          echo "Postgres disponible, creation du schema"

          # psql : client PostgreSQL en ligne de commande.
          # -h postgres : hôte (Service Kubernetes).
          # -U mluser : utilisateur.
          # -d mldb : base de données cible.
          # <<SQL ... SQL : heredoc pour passer le script SQL directement.
          psql -h postgres -U mluser -d mldb <<SQL
          CREATE TABLE IF NOT EXISTS predictions (
            id SERIAL PRIMARY KEY,      -- Identifiant auto-incrémenté.
            age INTEGER NOT NULL,       -- Age de l'emprunteur.
            revenu FLOAT NOT NULL,      -- Revenu annuel.
            anciennete INTEGER NOT NULL,-- Ancienneté professionnelle en années.
            dettes FLOAT DEFAULT 0,     -- Montant total des dettes (0 par défaut).
            score FLOAT NOT NULL,       -- Score de probabilité retourné par le modèle ML.
            classe INTEGER NOT NULL,    -- Classe prédite (0 = faible risque, 1 = risque élevé).
            pod VARCHAR(100),           -- Nom du pod qui a effectué la prédiction (pour le debug).
            model_version VARCHAR(20),  -- Version du modèle ML utilisée.
            created_at TIMESTAMP DEFAULT NOW()  -- Horodatage automatique de la prédiction.
          );

          -- Index sur created_at pour accélérer les requêtes de type "dernières prédictions".
          -- DESC = ordre décroissant, optimisé pour les requêtes ORDER BY created_at DESC.
          CREATE INDEX IF NOT EXISTS idx_pred_created
            ON predictions(created_at DESC);
          SQL
          echo "Schema cree avec succes"
