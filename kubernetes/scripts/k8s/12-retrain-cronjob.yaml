# ============================================
# 12-retrain-cronjob.yaml
# CronJob qui simule un ré-entraînement périodique du modèle ML.
# Un CronJob crée un Job à intervalle régulier (comme cron sur Linux).
# Pour la démo : s'exécute toutes les 2 minutes.
# En production : utiliser une fréquence journalière ou hebdomadaire.
# Ce job écrit dans Redis la version et l'heure du dernier entraînement.
# ============================================

# Version de l'API pour les ressources batch (Job, CronJob).
apiVersion: batch/v1

# Type de ressource : CronJob = Job planifié à intervalles réguliers.
kind: CronJob

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du CronJob.
  name: model-retrain

  # Namespace cible.
  namespace: ml-demo

# Spécifications du CronJob.
spec:

  # Expression cron définissant la fréquence d'exécution.
  # Format : minute heure jour-du-mois mois jour-de-semaine
  # "*/2 * * * *" = toutes les 2 minutes (*/2 = chaque multiple de 2).
  # Exemples : "0 2 * * *" = tous les jours à 2h, "0 0 * * 0" = tous les dimanches à minuit.
  schedule: "*/2 * * * *"

  # Politique de concurrence : que faire si le Job précédent tourne encore ?
  # "Forbid" : ne pas démarrer un nouveau Job si l'ancien est encore en cours.
  # Alternatives : "Allow" (parallèles autorisés), "Replace" (annule l'ancien).
  concurrencyPolicy: Forbid

  # Nombre de Jobs terminés avec succès à conserver dans l'historique.
  # Visible avec : kubectl get jobs -n ml-demo
  successfulJobsHistoryLimit: 3

  # Nombre de Jobs échoués à conserver dans l'historique (pour debug).
  failedJobsHistoryLimit: 2

  # Template du Job créé à chaque déclenchement du CronJob.
  jobTemplate:
    spec:

      # Nombre maximum de tentatives en cas d'échec.
      backoffLimit: 1

      # Nettoyage automatique du Job 600s (10 min) après sa fin.
      ttlSecondsAfterFinished: 600

      # Template du pod créé par le Job.
      template:
        spec:

          # Politique de redémarrage du conteneur en cas d'échec.
          restartPolicy: OnFailure

          # Liste des conteneurs.
          containers:

          - name: retrain             # Nom du conteneur.
            image: redis:7-alpine     # Utilise l'image Redis car elle contient le client redis-cli.
                                      # Pas besoin d'une image ML complète pour cette simulation.

            # Script shell exécuté dans le conteneur.
            command:
            - sh    # Interpréteur shell.
            - -c    # Indique que la commande suivante est une chaîne shell.
            - |     # Bloc de texte littéral YAML (préserve les sauts de ligne).

              # Récupère la date/heure courante au format ISO 8601 (ex: 2024-01-15T10:30:00+00:00).
              NOW=$(date -Iseconds)
              echo "[${NOW}] Demarrage du re-entrainement simule"

              # Simule la lecture des données d'entraînement depuis une source externe.
              echo "[${NOW}] Lecture des donnees d'entrainement..."
              sleep 5  # Simule 5 secondes de chargement des données.

              echo "[${NOW}] Training en cours..."
              sleep 3  # Simule 3 secondes d'entraînement du modèle.

              # Génère un identifiant de version unique basé sur le timestamp Unix.
              # date +%s = secondes depuis Epoch. | tail -c 5 = garde les 5 derniers caractères.
              VERSION="v1.0.$(date +%s | tail -c 5)"
              echo "[${NOW}] Nouveau modele : ${VERSION}"

              echo "[${NOW}] Push dans Redis..."
              # Stocke la version du modèle dans Redis.
              # redis-cli -h redis : se connecte au Service Redis via le DNS interne.
              # SET "model:latest" "${VERSION}" : stocke la version sous la clé "model:latest".
              # > /dev/null : redirige la sortie standard vers /dev/null (supprime "OK").
              redis-cli -h redis SET "model:latest" "${VERSION}" > /dev/null

              # Stocke l'horodatage de l'entraînement dans Redis.
              redis-cli -h redis SET "model:trained_at" "${NOW}" > /dev/null

              echo "[${NOW}] Re-entrainement termine avec succes"

            # Ressources CPU et mémoire pour ce conteneur.
            resources:

              # Ressources minimales garanties.
              requests:
                cpu: 50m      # 50 millicores (tâche légère).
                memory: 32Mi  # 32 Mo RAM.

              # Ressources maximales.
              limits:
                cpu: 200m     # Maximum 0.2 CPU.
                memory: 64Mi  # Maximum 64 Mo RAM.
