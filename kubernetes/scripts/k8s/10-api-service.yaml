# ============================================
# 10-api-service.yaml
# Service ClusterIP devant les pods ml-api.
# Ce Service joue le rôle de load balancer interne :
# il distribue le trafic entrant entre les 3 pods ml-api.
# L'Ingress (13-ingress.yaml) enverra le trafic vers ce Service,
# qui le distribuera ensuite aux pods disponibles.
# ============================================

# Version de l'API Kubernetes. "v1" pour les ressources de base.
apiVersion: v1

# Type de ressource : Service = point d'accès réseau stable et load balancer.
kind: Service

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du Service. Devient le DNS interne "ml-api.ml-demo.svc.cluster.local".
  # Référencé dans l'Ingress (13-ingress.yaml) comme backend.
  name: ml-api

  # Namespace cible.
  namespace: ml-demo

# Spécifications du Service.
spec:

  # Type ClusterIP : IP virtuelle accessible uniquement depuis l'intérieur du cluster.
  # Le trafic externe passe par l'Ingress → Service → pods.
  type: ClusterIP

  # Sélecteur : le Service route le trafic vers les pods ayant ces labels.
  # kube-proxy met à jour automatiquement la liste des pods sains (ceux dont readinessProbe passe).
  selector:
    app: ml-api  # Correspond au label "app: ml-api" dans le template du Deployment.

  # Ports exposés par ce Service.
  ports:
  - port: 80          # Port du Service (les clients internes contactent ml-api:80).
    targetPort: http  # Port du conteneur vers lequel rediriger. "http" = port nommé = 8000.
    name: http        # Nom symbolique du port (utilisé par le ServiceMonitor et l'Ingress).
