# ============================================
# 13-ingress.yaml
# Ingress : point d'entrée HTTP/HTTPS externe vers le cluster.
# L'Ingress est un reverse proxy géré par Kubernetes.
# Il reçoit le trafic externe et le route vers les Services internes.
#
# Prérequis pour faire fonctionner cet Ingress en local :
#   1. Activer le contrôleur Ingress nginx dans Minikube :
#        minikube addons enable ingress
#   2. Lancer minikube tunnel (dans un terminal séparé, en admin) :
#        minikube tunnel
#   3. Ajouter l'entrée DNS locale dans /etc/hosts (Linux/Mac)
#      ou C:\Windows\System32\drivers\etc\hosts (Windows) :
#        127.0.0.1 mldemo.local
#   Ensuite : curl http://mldemo.local/health
# ============================================

# Version de l'API pour les ressources réseau.
apiVersion: networking.k8s.io/v1

# Type de ressource : Ingress = règles de routage HTTP externe vers Services internes.
kind: Ingress

# Métadonnées d'identification de la ressource.
metadata:

  # Nom de l'Ingress.
  name: ml-api-ingress

  # Namespace cible.
  namespace: ml-demo

  # Annotations : configuration spécifique au contrôleur Ingress utilisé (ici nginx).
  # Ces annotations modifient le comportement du reverse proxy nginx.
  annotations:
    # Taille maximale du corps d'une requête HTTP acceptée par nginx.
    # "10m" = 10 mégaoctets. Utile si l'API reçoit des données volumineuses.
    # Par défaut nginx limite à 1m, ce qui peut causer des erreurs 413 (Request Too Large).
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

# Spécifications de l'Ingress.
spec:

  # Classe d'Ingress : indique quel contrôleur Ingress doit gérer cette ressource.
  # "nginx" = utilise le contrôleur Ingress nginx (installé via l'addon Minikube).
  # D'autres classes existent : "traefik", "haproxy", "istio", etc.
  ingressClassName: nginx

  # Règles de routage HTTP.
  rules:

  # Règle pour le nom d'hôte "mldemo.local".
  # Le contrôleur nginx route le trafic différemment selon le "Host" header de la requête.
  - host: mldemo.local

    # Routage HTTP (non HTTPS ici, pas de TLS configuré).
    http:

      # Liste des chemins et leurs backends associés.
      paths:

      # Chemin "/" : capture toutes les requêtes (/, /health, /predict, /metrics...).
      - path: /

        # Type de correspondance du chemin.
        # "Prefix" : le chemin de la requête doit commencer par "/" → capture tout.
        # Autres types : "Exact" (chemin exact), "ImplementationSpecific" (comportement du contrôleur).
        pathType: Prefix

        # Backend : Service vers lequel router le trafic qui correspond à cette règle.
        backend:
          service:
            name: ml-api  # Nom du Service cible (défini dans 10-api-service.yaml).
            port:
              number: 80  # Port du Service ml-api vers lequel envoyer le trafic.
