# ============================================
# 00-namespace.yaml
# Le namespace isole toutes les ressources du projet
# dans un espace de noms dédié "ml-demo".
# Cela évite les conflits de noms avec d'autres
# applications qui tournent dans le même cluster.
# ============================================

# Version de l'API Kubernetes utilisée pour cette ressource.
# "v1" est la version stable pour les ressources de base (Namespace, Pod, Service, ConfigMap...).
apiVersion: v1

# Type de ressource Kubernetes que l'on crée ici.
# "Namespace" crée un espace de noms isolé dans le cluster.
# Tous les pods, services, etc. de ce projet vivront dans cet espace.
kind: Namespace

# Métadonnées : informations qui identifient et décrivent la ressource.
metadata:

  # Nom unique du namespace dans tout le cluster.
  # Les autres ressources du projet feront référence à "ml-demo" via le champ "namespace:".
  name: ml-demo

  # Labels : paires clé/valeur attachées à la ressource.
  # Utilisés pour filtrer et sélectionner des ressources :
  #   kubectl get all -n ml-demo -l project=ml-scoring-demo
  labels:

    # Identifie à quel projet appartient ce namespace.
    # Pratique si plusieurs projets coexistent dans le même cluster.
    project: ml-scoring-demo

    # Indique l'environnement de déploiement.
    # Valeurs possibles : local, staging, production
    environment: local
