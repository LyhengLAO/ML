# ============================================
# 17-grafana-dashboard.yaml
# Dashboard Grafana pré-configuré pour l'API ML.
# Stocké dans un ConfigMap avec le label "grafana_dashboard: 1".
# Le sidecar Grafana détecte automatiquement ce ConfigMap et
# importe le dashboard sans redémarrage de Grafana.
#
# Prérequis : kube-prometheus-stack installé avec :
#   --set grafana.sidecar.dashboards.enabled=true
#   --set grafana.sidecar.dashboards.label=grafana_dashboard
#
# Le dashboard contient 8 panels de monitoring :
#   1. Requêtes/seconde (total)
#   2. Nombre de pods actifs
#   3. Latence p95
#   4. Cache hit ratio
#   5. Requêtes/seconde par pod (timeseries)
#   6. Latence p50/p95/p99 (timeseries)
#   7. Distribution des classes prédites (timeseries)
#   8. Cache hits vs misses (timeseries)
# ============================================

# Version de l'API Kubernetes. "v1" pour les ressources de base.
apiVersion: v1

# Type de ressource : ConfigMap = stockage de configuration en clair.
# On stocke le JSON du dashboard dans un ConfigMap pour que Grafana puisse le détecter.
kind: ConfigMap

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du ConfigMap.
  name: ml-api-dashboard

  # Namespace "monitoring" : le sidecar Grafana surveille ce namespace pour détecter les dashboards.
  # IMPORTANT : c'est le namespace de Grafana, pas "ml-demo".
  namespace: monitoring

  # Labels sur le ConfigMap.
  labels:
    # Label "grafana_dashboard: 1" : signal au sidecar Grafana pour détecter ce ConfigMap.
    # Le sidecar surveille tous les ConfigMaps avec ce label et les importe automatiquement.
    # La valeur "1" est une convention (n'importe quelle valeur non vide fonctionne).
    grafana_dashboard: "1"

# Section data : le contenu du ConfigMap.
data:

  # Nom du fichier tel que Grafana le verra. Doit se terminer par .json.
  # Grafana charge ce fichier JSON comme définition de dashboard.
  ml-api.json: |
    {
      "title": "ML Scoring API",         // Titre affiché dans l'interface Grafana.
      "uid": "ml-api-demo",              // Identifiant unique du dashboard (pour les liens et imports).
      "timezone": "browser",             // Fuseau horaire : utilise celui du navigateur de l'utilisateur.
      "refresh": "10s",                  // Auto-refresh toutes les 10 secondes.
      "time": {"from": "now-15m", "to": "now"},  // Plage de temps par défaut : les 15 dernières minutes.
      "schemaVersion": 38,               // Version du schéma JSON de Grafana (compatibilité).
      "version": 1,                      // Version du dashboard (pour le suivi des modifications).
      "panels": [

        // ── Panel 1 : Requêtes par seconde (total) ──────────────────────────────
        {
          "id": 1,
          "type": "stat",                // Type "stat" : affiche une valeur unique avec couleur.
          "title": "Requetes par seconde",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},  // Position et taille dans la grille (24 colonnes).
          "targets": [{
            // Requête PromQL : taux de prédictions sur 1 minute, sommé sur tous les pods.
            // rate() = taux moyen par seconde sur la fenêtre. sum() = total tous pods confondus.
            "expr": "sum(rate(ml_predictions_total[1m]))",
            "refId": "A"               // Identifiant de la requête dans ce panel.
          }]
        },

        // ── Panel 2 : Nombre de pods actifs ─────────────────────────────────────
        {
          "id": 2,
          "type": "stat",
          "title": "Nombre de pods",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "targets": [{
            // count() compte le nombre de séries temporelles uniques de ml_app_info.
            // Chaque pod expose une métrique ml_app_info → count = nombre de pods.
            "expr": "count(ml_app_info)",
            "refId": "A"
          }]
        },

        // ── Panel 3 : Latence au 95ème percentile ───────────────────────────────
        {
          "id": 3,
          "type": "stat",
          "title": "Latence p95 (s)",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 4},
          "targets": [{
            // histogram_quantile(0.95, ...) : calcule le 95ème percentile de latence.
            // 95% des requêtes ont une durée inférieure à cette valeur.
            // _bucket : métrique de type histogram avec des buckets de durée.
            "expr": "histogram_quantile(0.95, sum(rate(ml_prediction_duration_seconds_bucket[5m])) by (le))",
            "refId": "A"
          }]
        },

        // ── Panel 4 : Cache hit ratio ────────────────────────────────────────────
        {
          "id": 4,
          "type": "stat",
          "title": "Cache hit ratio",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 4},
          "targets": [{
            // Ratio = hits / (hits + misses). Résultat entre 0 et 1 (ex: 0.85 = 85% de hits).
            // Un ratio élevé signifie que Redis sert la plupart des prédictions sans appeler le modèle.
            "expr": "sum(rate(ml_cache_hits_total[5m])) / (sum(rate(ml_cache_hits_total[5m])) + sum(rate(ml_cache_misses_total[5m])))",
            "refId": "A"
          }]
        },

        // ── Panel 5 : Requêtes/seconde par pod (timeseries) ─────────────────────
        {
          "id": 5,
          "type": "timeseries",          // Type "timeseries" : graphique avec axe temporel.
          "title": "Requetes / seconde par pod",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [{
            // sum() by (pod) : décompose le taux de prédictions par pod.
            // Permet de vérifier que la charge est bien répartie entre les 3 pods.
            "expr": "sum(rate(ml_predictions_total[1m])) by (pod)",
            "legendFormat": "{{pod}}",   // Légende : utilise la valeur du label "pod" de chaque série.
            "refId": "A"
          }]
        },

        // ── Panel 6 : Latence par percentile (timeseries) ────────────────────────
        {
          "id": 6,
          "type": "timeseries",
          "title": "Latence par percentile",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              // p50 = médiane : 50% des requêtes sont plus rapides que cette valeur.
              "expr": "histogram_quantile(0.50, sum(rate(ml_prediction_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              // p95 : 95% des requêtes sont plus rapides. SLA courant pour les APIs ML.
              "expr": "histogram_quantile(0.95, sum(rate(ml_prediction_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              // p99 : 99% des requêtes sont plus rapides. Détecte les "long tail latencies".
              "expr": "histogram_quantile(0.99, sum(rate(ml_prediction_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },

        // ── Panel 7 : Distribution des classes prédites ──────────────────────────
        {
          "id": 7,
          "type": "timeseries",
          "title": "Distribution des classes predites",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [{
            // Décompose le taux de prédictions par classe (0 = faible risque, 1 = risque élevé).
            // Permet de détecter un déséquilibre ou une dérive du modèle (data drift).
            "expr": "sum(rate(ml_predictions_total[1m])) by (classe)",
            "legendFormat": "classe={{classe}}",
            "refId": "A"
          }]
        },

        // ── Panel 8 : Cache hits vs misses (timeseries) ──────────────────────────
        {
          "id": 8,
          "type": "timeseries",
          "title": "Cache : hits vs misses",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              // Taux de hits Redis : requêtes servies depuis le cache sans appel au modèle.
              "expr": "sum(rate(ml_cache_hits_total[1m]))",
              "legendFormat": "hits",
              "refId": "A"
            },
            {
              // Taux de misses Redis : requêtes nécessitant un calcul par le modèle ML.
              "expr": "sum(rate(ml_cache_misses_total[1m]))",
              "legendFormat": "misses",
              "refId": "B"
            }
          ]
        }
      ]
    }
