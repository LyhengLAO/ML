# ============================================
# 11-api-hpa.yaml
# HorizontalPodAutoscaler (HPA) pour l'API ML.
# Le HPA ajuste automatiquement le nombre de répliques
# du Deployment ml-api en fonction de la charge CPU.
# Si l'utilisation CPU dépasse 50%, Kubernetes ajoute des pods.
# Si elle descend en dessous, Kubernetes retire des pods.
#
# Prérequis : metrics-server doit être actif.
#   minikube addons enable metrics-server
# ============================================

# Version de l'API pour l'autoscaling (v2 = métriques avancées).
# autoscaling/v1 : seulement CPU. autoscaling/v2 : CPU, mémoire, métriques custom.
apiVersion: autoscaling/v2

# Type de ressource : HorizontalPodAutoscaler = autoscaling horizontal.
# Horizontal = ajoute/retire des répliques (vs Vertical = augmente CPU/RAM d'un pod).
kind: HorizontalPodAutoscaler

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du HPA.
  name: ml-api-hpa

  # Namespace cible.
  namespace: ml-demo

# Spécifications du HPA.
spec:

  # Cible du scaling : quel Deployment doit être mis à l'échelle ?
  scaleTargetRef:
    apiVersion: apps/v1  # Groupe API de la ressource cible.
    kind: Deployment     # Type de la ressource cible.
    name: ml-api         # Nom du Deployment à scaler (doit exister dans le même namespace).

  # Nombre minimum de répliques. Même si le CPU est à 0%, on garde 2 pods.
  # Garantit la haute disponibilité (2 pods sur des nœuds différents si possible).
  minReplicas: 2

  # Nombre maximum de répliques. Limite les coûts en cas de pic de charge.
  maxReplicas: 10

  # Métriques utilisées pour décider du scaling.
  metrics:

  # Métrique de type Resource (CPU ou mémoire du conteneur).
  - type: Resource
    resource:

      # Métrique CPU du conteneur.
      name: cpu

      # Cible de la métrique.
      target:
        type: Utilization          # Utilisation en pourcentage des "requests" CPU.
        averageUtilization: 50     # Cible 50% d'utilisation CPU moyenne sur tous les pods.
                                   # Si la moyenne dépasse 50% → scale up.
                                   # Si la moyenne descend sous 50% → scale down.

  # Comportements de scaling personnalisés.
  behavior:

    # Comportement lors du scale down (réduction du nombre de pods).
    scaleDown:
      stabilizationWindowSeconds: 60  # Attend 60s de charge faible avant de réduire.
                                       # Evite les oscillations rapides (scale up/down en boucle).

    # Comportement lors du scale up (augmentation du nombre de pods).
    scaleUp:
      stabilizationWindowSeconds: 0   # Réagit immédiatement à une charge élevée (pas d'attente).

      # Politiques de scale up : définissent la vitesse maximale d'ajout de pods.
      policies:
      - type: Percent        # Politique en pourcentage du nombre de pods actuels.
        value: 100           # Peut doubler le nombre de pods par période.
                             # Ex : si 3 pods → peut passer à 6 pods en une période.
        periodSeconds: 15    # Période d'évaluation : maximum 100% d'augmentation toutes les 15s.
