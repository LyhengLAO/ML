# ============================================
# 02-secret.yaml
# Données sensibles (mots de passe de base de données).
# Les Secrets sont stockés encodés en base64 dans etcd.
# ATTENTION : en production, ne jamais committer des Secrets
# en clair dans git → utiliser HashiCorp Vault, SealedSecrets,
# ou External Secrets Operator à la place.
# ============================================

# Version de l'API Kubernetes. "v1" pour les ressources de base.
apiVersion: v1

# Type de ressource : Secret = stockage de données sensibles.
# Kubernetes encode les valeurs en base64 (ce n'est PAS du chiffrement).
kind: Secret

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du Secret, référencé dans les Deployments via "secretRef" ou "secretKeyRef".
  name: ml-api-secret

  # Namespace cible : cette ressource n'existe que dans "ml-demo".
  namespace: ml-demo

# Type de Secret. "Opaque" = usage générique, format libre.
# Autres types : kubernetes.io/tls (certificats), kubernetes.io/dockerconfigjson (registres privés).
type: Opaque

# stringData : valeurs en clair (Kubernetes les encode en base64 automatiquement).
# Alternative : "data:" avec des valeurs déjà encodées en base64.
StringData:

  # Mot de passe utilisé par l'API pour se connecter à PostgreSQL.
  DB_PASSWORD: "demopass123"

  # Mot de passe de l'utilisateur postgres (utilisé par le conteneur PostgreSQL
  # pour créer la base de données au premier démarrage).
  POSTGRES_PASSWORD: "demopass123"
