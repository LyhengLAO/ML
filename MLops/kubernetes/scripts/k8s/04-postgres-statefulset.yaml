# ============================================
# 04-postgres-statefulset.yaml
# Base de données PostgreSQL avec stockage persistant.
# On utilise un StatefulSet (et non un Deployment) car :
#   - Le pod a un nom stable et prévisible : postgres-0
#   - Chaque pod a son propre volume persistant (PVC dédié)
#   - Les données survivent aux redémarrages et reschedulings
# ============================================

# Version de l'API pour les ressources apps (Deployment, StatefulSet, DaemonSet...).
apiVersion: apps/v1

# Type de ressource : StatefulSet = déploiement avec identité stable et stockage dédié.
# Contrairement à un Deployment, les pods d'un StatefulSet ont des noms ordonnés (postgres-0, postgres-1...).
kind: StatefulSet

# Métadonnées d'identification de la ressource.
metadata:

  # Nom du StatefulSet. Les pods créés s'appelleront "postgres-0", "postgres-1"...
  name: postgres

  # Namespace cible.
  namespace: ml-demo

# Spécifications du StatefulSet.
spec:

  # Nom du Service headless associé (défini dans 05-postgres-service.yaml).
  # Requis pour que chaque pod ait un nom DNS stable : postgres-0.postgres.ml-demo.svc.cluster.local
  serviceName: postgres

  # Nombre de répliques. 1 seule instance PostgreSQL (pas de haute disponibilité ici).
  replicas: 1

  # Sélecteur : détermine quels pods sont gérés par ce StatefulSet.
  # Doit correspondre aux labels définis dans "template.metadata.labels".
  selector:
    matchLabels:
      app: postgres  # Sélectionne les pods ayant le label app=postgres

  # Template : modèle de pod que le StatefulSet va créer.
  template:

    # Métadonnées appliquées à chaque pod créé.
    metadata:
      labels:
        app: postgres  # Label qui permet au Service de trouver ce pod

    # Spécifications des conteneurs dans le pod.
    spec:

      # Liste des conteneurs dans ce pod (un seul ici : postgres).
      containers:

      - name: postgres                # Nom du conteneur dans le pod.
        image: postgres:16-alpine     # Image Docker : PostgreSQL 16, variante Alpine (légère).

        # Ports exposés par le conteneur.
        ports:
        - containerPort: 5432  # Port standard PostgreSQL sur lequel le processus écoute.
          name: pg             # Nom symbolique du port, utilisé dans les Services.

        # Variables d'environnement injectées dans le conteneur.
        env:

        # Nom de la base de données à créer au premier démarrage.
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:       # Récupère la valeur depuis un ConfigMap (pas en dur).
              name: ml-api-config  # Nom du ConfigMap source (01-configmap.yml).
              key: DB_NAME         # Clé dans le ConfigMap → valeur "mldb".

        # Nom de l'utilisateur PostgreSQL à créer.
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: ml-api-config
              key: DB_USER         # Clé dans le ConfigMap → valeur "mluser".

        # Mot de passe de l'utilisateur PostgreSQL (données sensibles → Secret).
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:          # Récupère la valeur depuis un Secret (chiffré en base64).
              name: ml-api-secrets # Nom du Secret source (02-secret.yml).
              key: POSTGRES_PASSWORD

        # Répertoire exact où PostgreSQL stocke ses fichiers de données.
        # On ajoute "/pgdata" pour éviter les problèmes de permissions avec le volume monté.
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata

        # Montage des volumes dans le conteneur.
        volumeMounts:
        - name: pgdata                         # Nom du volume (doit correspondre à volumeClaimTemplates).
          mountPath: /var/lib/postgresql/data  # Chemin dans le conteneur où le volume est monté.

        # Ressources CPU et mémoire allouées au conteneur.
        resources:

          # Ressources minimales garanties (le pod ne démarrera pas si le nœud ne peut pas fournir ça).
          requests:
            cpu: 100m      # 100 millicores = 0.1 CPU. Suffisant pour un PostgreSQL léger.
            memory: 128Mi  # 128 mégaoctets de mémoire RAM garantis.

          # Ressources maximales autorisées (le conteneur est throttlé/tué s'il dépasse).
          limits:
            cpu: 500m      # Maximum 0.5 CPU (le conteneur sera ralenti au-delà).
            memory: 256Mi  # Maximum 256 Mo RAM (le pod sera redémarré s'il dépasse = OOMKilled).

        # Sonde de disponibilité : Kubernetes n'envoie pas de trafic tant que cette sonde échoue.
        # Utilisée pour attendre que PostgreSQL soit prêt avant d'accepter des connexions.
        readinessProbe:
          exec:
            # pg_isready vérifie si PostgreSQL accepte des connexions.
            command: ["pg_isready", "-U", "mluser"]
          periodSeconds: 5         # Vérifie toutes les 5 secondes.
          initialDelaySeconds: 10  # Attend 10s après le démarrage du conteneur avant la première vérification.

        # Sonde de vie : si cette sonde échoue, Kubernetes redémarre le conteneur.
        # Détecte les blocages ou crashs silencieux de PostgreSQL.
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "mluser"]
          periodSeconds: 30        # Vérifie toutes les 30s (moins fréquent que readiness).
          initialDelaySeconds: 30  # Attend 30s au démarrage (PostgreSQL met du temps à initialiser).

  # Templates de PVC : crée automatiquement un PVC par réplique du StatefulSet.
  # Contrairement aux volumes normaux, ces PVCs persistent après la suppression du pod.
  volumeClaimTemplates:
  - metadata:
      name: pgdata  # Nom du volume, référencé dans "volumeMounts[].name".
    spec:

      # Mode d'accès : un seul nœud peut écrire sur ce volume à la fois.
      accessModes: ["ReadWriteOnce"]

      resources:
        requests:
          storage: 1Gi  # Demande 1 gigaoctet de stockage pour les données PostgreSQL.
