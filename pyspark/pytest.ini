[pytest]
# ── Découverte ─────────────────────────────────────────────────────────────────
testpaths  = tests
pythonpath = .          ; ajoute le projet root à sys.path (pytest >= 7)

# ── Marqueurs personnalisés ────────────────────────────────────────────────────
markers =
    unit:        Tests unitaires rapides (sans réseau ni gros fichiers)
    integration: Tests d'intégration (Spark + fichiers temporaires, ~1-5 min)
    slow:        Tests particulièrement longs

# ── Affichage ──────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ── Filtres d'avertissements ───────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::ResourceWarning
